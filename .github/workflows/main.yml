name: Build & Release

on:
  push:
    tags:
      - 'v*' # 保留原有的 tag 触发方式
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如: v1.0.1)'
        required: true
        default: 'v1.0.0'
      release_note:
        description: '发布日志简述'
        required: false
        default: 'Manual trigger release'

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    # 添加权限，否则 Action 可能无法创建 Release
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # ... (中间的编译步骤保持不变) ...
      - name: Build linux/amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o webplayer-linux-amd64 .

      - name: Build linux/arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o webplayer-linux-arm64 .

      # ── 逻辑修改：只要是 tag 触发 OR 手动输入了版本号，就执行 Release ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          # 优先使用手动输入的版本号，如果没有（即 tag 触发），则使用 tag 名
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: "WebPlayer ${{ github.event.inputs.version || github.ref_name }}"
          body: |
            ## WebPlayer ${{ github.event.inputs.version || github.ref_name }}
            ${{ github.event.inputs.release_note }}

            ### 下载
            | 文件 | 架构 |
            |------|------|
            | `webplayer-linux-amd64` | x86_64 服务器/PC |
            | `webplayer-linux-arm64` | ARM64（树莓派等） |

            ### 快速使用
            ```bash
            chmod +x webplayer-linux-amd64
            ./webplayer-linux-amd64
            ```
          files: |
            webplayer-linux-amd64
            webplayer-linux-arm64
          draft: false
          prerelease: false
