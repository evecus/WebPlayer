<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebPlayer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f5f6fa;
  --surface:   #ffffff;
  --surface2:  #f0f1f6;
  --surface3:  #e8eaf2;
  --border:    #e2e4ee;
  --accent:    #5b6af0;
  --accent-lt: #eef0fe;
  --accent2:   #f0616b;
  --text:      #1a1d2e;
  --text2:     #5c6080;
  --text3:     #9da3bf;
  --success:   #22c55e;
  --danger:    #ef4444;
  --sidebar-w: 280px;
  --header-h:  58px;
  --radius:    12px;
  --shadow:    0 1px 4px rgba(30,35,80,.07), 0 4px 20px rgba(30,35,80,.05);
  --shadow-md: 0 2px 8px rgba(30,35,80,.10), 0 8px 32px rgba(30,35,80,.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ── Layout ── */
#app {
  display: grid;
  grid-template-rows: var(--header-h) 1fr;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-areas: "header header" "sidebar main";
  height: 100vh;
}

/* ── Header ── */
#header {
  grid-area: header;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 9px;
  flex-shrink: 0;
  text-decoration: none;
}

.logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-icon svg { width: 15px; height: 15px; fill: white; }

.logo-text {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}

#url-bar {
  flex: 1;
  display: flex;
  gap: 8px;
  max-width: 560px;
}

#url-input {
  flex: 1;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 8px 14px;
  color: var(--text);
  font-size: 13px;
  font-family: 'Outfit', sans-serif;
  transition: border-color .2s, box-shadow .2s;
  outline: none;
}
#url-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(91,106,240,.12);
  background: var(--surface);
}
#url-input::placeholder { color: var(--text3); }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border: none; border-radius: 9px;
  cursor: pointer;
  font-size: 13px; font-weight: 500;
  font-family: 'Outfit', sans-serif;
  transition: all .16s;
  white-space: nowrap;
  letter-spacing: 0;
}
.btn-primary {
  background: var(--accent);
  color: white;
}
.btn-primary:hover { background: #4858e8; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(91,106,240,.35); }
.btn-secondary {
  background: var(--surface2);
  color: var(--text2);
  border: 1.5px solid var(--border);
}
.btn-secondary:hover { background: var(--surface3); color: var(--text); border-color: var(--text3); }
.btn-danger { background: rgba(239,68,68,.08); color: var(--danger); border: 1.5px solid rgba(239,68,68,.15); }
.btn-danger:hover { background: rgba(239,68,68,.15); }
.btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 7px; }
.btn-icon { padding: 7px; border-radius: 8px; }

.header-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }

.lang-btn {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 7px;
  padding: 5px 11px;
  color: var(--text2);
  cursor: pointer;
  font-size: 12px;
  font-family: 'Outfit', sans-serif;
  font-weight: 500;
  transition: all .16s;
}
.lang-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }

/* ── Sidebar ── */
#sidebar {
  grid-area: sidebar;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-tabs {
  display: flex;
  padding: 12px 12px 0;
  gap: 4px;
  flex-shrink: 0;
}
.sidebar-tab {
  flex: 1;
  padding: 8px 8px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  transition: all .16s;
  border-radius: 8px 8px 0 0;
  border-bottom: 2px solid transparent;
  letter-spacing: 0.2px;
}
.sidebar-tab:hover { color: var(--text2); }
.sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--accent-lt); }

.sidebar-pane { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.sidebar-pane.active { display: flex; }

.sidebar-toolbar {
  display: flex; gap: 6px; padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.channel-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
}

.channel-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 9px;
  cursor: pointer;
  transition: background .14s;
  border: 1.5px solid transparent;
  position: relative;
  user-select: none;
}
.channel-item:hover { background: var(--surface2); }
.channel-item.playing {
  background: var(--accent-lt);
  border-color: rgba(91,106,240,.2);
}
.channel-item.playing::before {
  content: '';
  position: absolute;
  left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 55%;
  background: var(--accent);
  border-radius: 2px;
}

.channel-logo {
  width: 34px; height: 34px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  font-family: 'Outfit', sans-serif;
}
.channel-logo img { width: 100%; height: 100%; object-fit: contain; }

.channel-info { flex: 1; min-width: 0; }
.channel-name {
  font-size: 13px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}
.channel-group { font-size: 11px; color: var(--text3); margin-top: 2px; }

.channel-actions { display: none; gap: 4px; flex-shrink: 0; }
.channel-item:hover .channel-actions { display: flex; }

.icon-btn {
  width: 26px; height: 26px;
  border: none; background: none;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text3);
  transition: all .14s;
}
.icon-btn:hover { background: var(--surface3); color: var(--text); }
.icon-btn.del:hover { color: var(--danger); background: rgba(239,68,68,.08); }

/* Playing indicator */
.playing-bars { display: flex; align-items: flex-end; gap: 2px; height: 14px; }
.playing-bars span { width: 3px; background: var(--accent); border-radius: 1px; animation: bars 0.8s ease-in-out infinite; }
.playing-bars span:nth-child(2) { animation-delay: .15s; }
.playing-bars span:nth-child(3) { animation-delay: .3s; }
@keyframes bars { 0%, 100% { height: 3px; } 50% { height: 13px; } }

.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; padding: 40px 20px;
  color: var(--text3); text-align: center;
}
.empty-state svg { opacity: .4; }
.empty-state p { font-size: 13px; line-height: 1.6; }

.group-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--text3);
  padding: 10px 10px 4px;
}

.playlist-header {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px;
  background: var(--surface2);
  border-radius: 8px;
  margin: 4px 2px 2px;
  cursor: default;
  border: 1px solid var(--border);
}
.playlist-header-name {
  flex: 1; font-size: 12px; font-weight: 600;
  color: var(--text2); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.playlist-count {
  font-size: 10px; color: var(--text3);
  background: var(--surface3);
  padding: 1px 7px; border-radius: 20px;
  font-weight: 500;
}

/* ── Main Content ── */
#main {
  grid-area: main;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* ── Player ── */
#player-wrap { flex-shrink: 0; position: relative; background: #000; }

.video-container {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  max-height: calc(100vh - var(--header-h) - 110px);
  background: #000;
  display: flex; align-items: center; justify-content: center;
}

#video { width: 100%; height: 100%; display: block; outline: none; }

.video-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  opacity: 0;
  transition: opacity .25s;
  background: linear-gradient(transparent 45%, rgba(0,0,0,.75));
}
.video-container:hover .video-overlay,
.video-container.paused .video-overlay { opacity: 1; }

.overlay-title {
  font-size: 13px; font-weight: 600;
  padding: 0 16px 4px;
  color: white;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.overlay-controls {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px 14px;
}

.ctl-btn {
  width: 32px; height: 32px;
  border: none; background: rgba(255,255,255,.15);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: white; font-size: 13px;
  transition: background .14s;
  backdrop-filter: blur(6px);
}
.ctl-btn:hover { background: rgba(255,255,255,.28); }
.ctl-btn.big { width: 42px; height: 42px; font-size: 17px; }

.progress-bar {
  flex: 1; height: 4px;
  background: rgba(255,255,255,.22);
  border-radius: 2px; cursor: pointer;
  position: relative; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent);
  border-radius: 2px; transition: width .1s;
  pointer-events: none;
}

.vol-wrap { display: flex; align-items: center; gap: 6px; }
input[type=range] {
  -webkit-appearance: none;
  width: 68px; height: 3px;
  background: rgba(255,255,255,.28);
  border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  background: white; border-radius: 50%;
}

.time-label { font-size: 11px; color: rgba(255,255,255,.85); white-space: nowrap; font-family: 'JetBrains Mono', monospace; }

/* Status bar */
#status-bar {
  padding: 7px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}

.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--border); flex-shrink: 0; transition: background .3s;
}
.status-dot.live { background: var(--success); box-shadow: 0 0 6px rgba(34,197,94,.4); animation: pulse 2s infinite; }
.status-dot.error { background: var(--danger); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

.status-text { font-size: 12px; color: var(--text2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.status-url { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; font-family: 'JetBrains Mono', monospace; }

/* Info panel */
#info-panel { flex: 1; overflow-y: auto; padding: 14px 16px; }

/* ── Modal ── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(20,24,50,.35);
  backdrop-filter: blur(6px);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .22s;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  width: min(500px, 95vw);
  max-height: 90vh;
  overflow-y: auto;
  transform: scale(.96) translateY(8px);
  transition: transform .22s;
  box-shadow: var(--shadow-md);
}
.modal-backdrop.open .modal { transform: scale(1) translateY(0); }

.modal-title {
  font-size: 17px; font-weight: 700;
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 10px;
  color: var(--text);
}
.modal-title span { font-size: 20px; }

.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; font-weight: 600; letter-spacing: 0.2px; }
.form-input {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 9px 12px;
  color: var(--text);
  font-size: 13px;
  font-family: 'Outfit', sans-serif;
  outline: none;
  transition: border-color .18s, box-shadow .18s;
}
.form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,106,240,.12); background: var(--surface); }
.form-input::placeholder { color: var(--text3); }
textarea.form-input { resize: vertical; min-height: 110px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

.form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

/* Drop zone */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 28px 20px;
  text-align: center;
  cursor: pointer;
  transition: all .18s;
  color: var(--text3);
  background: var(--surface2);
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-lt);
  color: var(--accent);
}
.drop-zone svg { margin: 0 auto 10px; display: block; }
.drop-zone p { font-size: 13px; font-weight: 500; }
.drop-zone small { font-size: 11px; margin-top: 5px; display: block; opacity: .7; }

/* Toast */
#toast-container {
  position: fixed; bottom: 20px; right: 20px;
  z-index: 9999;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
  font-size: 13px;
  display: flex; align-items: center; gap: 8px;
  box-shadow: var(--shadow-md);
  animation: slideIn .28s ease;
  min-width: 200px; max-width: 300px;
  font-family: 'Outfit', sans-serif;
}
.toast.success { border-left: 3px solid var(--success); }
.toast.error { border-left: 3px solid var(--danger); }
.toast.info { border-left: 3px solid var(--accent); }
@keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: none; opacity: 1; } }

/* Search */
.search-wrap { padding: 8px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 7px;
  padding: 6px 10px;
  color: var(--text);
  font-size: 12px; outline: none;
  font-family: 'Outfit', sans-serif;
  transition: border-color .16s;
}
.search-input:focus { border-color: var(--accent); background: var(--surface); }
.search-input::placeholder { color: var(--text3); }

/* Badges */
.badge {
  display: inline-block;
  padding: 1px 6px; border-radius: 4px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.4px;
  font-family: 'JetBrains Mono', monospace;
}
.badge-hls { background: rgba(91,106,240,.12); color: var(--accent); }
.badge-mp4 { background: rgba(34,197,94,.12); color: var(--success); }
.badge-rtmp { background: rgba(240,97,107,.12); color: var(--accent2); }

/* Sidebar toggle (mobile) */
#sidebar-toggle { display: none; }

/* No video placeholder */
.no-video-placeholder {
  width: 100%;
  aspect-ratio: 16/9;
  max-height: calc(100vh - var(--header-h) - 110px);
  background: #111318;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: #6b7280;
  position: relative; overflow: hidden;
}
.no-video-placeholder::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 60%, rgba(91,106,240,.07) 0%, transparent 70%);
}
.no-video-placeholder .big-icon { font-size: 48px; opacity: .35; filter: grayscale(1); }
.no-video-placeholder h3 { font-size: 16px; font-weight: 600; color: #9ca3af; font-family: 'Outfit', sans-serif; }
.no-video-placeholder p { font-size: 13px; color: #6b7280; }

/* Spinner */
.spinner {
  width: 26px; height: 26px;
  border: 2.5px solid rgba(255,255,255,.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.6);
  display: none; align-items: center; justify-content: center; z-index: 10;
}
.loading-overlay.active { display: flex; }

/* Import tabs */
#import-tabs { display: flex; gap: 6px; margin-bottom: 16px; }

@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  #app { grid-template-columns: 0 1fr; }
  #sidebar { position: fixed; left: -280px; top: 0; height: 100vh; width: 280px; z-index: 200; transition: left .28s; }
  #sidebar.open { left: 0; }
  #sidebar-toggle { display: flex; }
}
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header id="header">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <span class="logo-text">WebPlayer</span>
    </div>

    <div id="url-bar">
      <input id="url-input" type="url" placeholder="输入视频地址 .m3u8 / .mp4 ..." autocomplete="off" spellcheck="false">
      <button class="btn btn-primary" onclick="playFromURLBar()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <span data-i18n="play">播放</span>
      </button>
    </div>

    <div class="header-right">
      <button class="btn btn-secondary" onclick="openImportModal()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        <span data-i18n="importM3U">导入 M3U</span>
      </button>
      <button class="lang-btn" onclick="toggleLang()" id="lang-btn">EN</button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-tabs">
      <div class="sidebar-tab active" data-tab="playlists" onclick="switchTab('playlists')" data-i18n="playlists">播放列表</div>
      <div class="sidebar-tab" data-tab="history" onclick="switchTab('history')" data-i18n="history">历史</div>
    </div>

    <div class="sidebar-pane active" id="pane-playlists">
      <div class="sidebar-toolbar">
        <button class="btn btn-secondary btn-sm" onclick="openAddChannelModal()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/></svg>
          <span data-i18n="addChannel">添加</span>
        </button>
        <button class="btn btn-secondary btn-sm" onclick="openImportModal()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          M3U
        </button>
      </div>
      <div class="search-wrap">
        <input class="search-input" id="channel-search" placeholder="搜索频道..." oninput="renderPlaylists()" data-i18n-placeholder="search">
      </div>
      <div class="channel-list" id="playlist-channels"></div>
    </div>

    <div class="sidebar-pane" id="pane-history">
      <div class="sidebar-toolbar">
        <button class="btn btn-danger btn-sm" onclick="clearHistory()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6M10 11v6M14 11v6M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
          <span data-i18n="clearHistory">清空</span>

    </div>
  </aside>

  <!-- Main -->
  <main id="main">
    <div id="player-wrap">
      <div class="no-video-placeholder" id="no-video">
        <div class="big-icon">▶</div>
        <h3 data-i18n="noVideoTitle">准备就绪</h3>
        <p data-i18n="noVideoSub">在上方输入地址，或从左侧选择频道</p>
      </div>

      <div class="video-container" id="video-container" style="display:none;">
        <video id="video" playsinline></video>
        <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>
        <div class="video-overlay" id="video-overlay">
          <div class="overlay-title" id="overlay-title"></div>
          <div class="overlay-controls">
            <button class="ctl-btn" onclick="skip(-10)">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6H4c0 4.4 3.6 8 8 8s8-3.6 8-8-3.6-8-8-8z"/></svg>
            </button>
            <button class="ctl-btn big" id="play-pause-btn" onclick="togglePlayPause()">
              <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              <svg id="pause-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="ctl-btn" onclick="skip(10)">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1l5 5-5 5V7c-3.3 0-6 2.7-6 6s2.7 6 6 6 6-2.7 6-6h2c0 4.4-3.6 8-8 8s-8-3.6-8-8 3.6-8 8-8z"/></svg>
            </button>
            <div class="progress-bar" id="progress-bar" onclick="seekTo(event)">
              <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
            <span class="time-label" id="time-label">0:00 / 0:00</span>
            <div class="vol-wrap">
              <button class="ctl-btn" onclick="toggleMute()">
                <svg id="vol-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.8-1-3.3-2.5-4.1v8.2c1.5-.8 2.5-2.3 2.5-4.1zm2.5-.1c0 3-1.8 5.6-4.5 6.9l1.2 1.9C19.5 19.2 22 15.8 22 12s-2.5-7.2-6.3-8.7l-1.2 1.9C17.2 6.5 19 9.1 19 12z"/></svg>
              </button>
              <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
            </div>
            <button class="ctl-btn" onclick="toggleFullscreen()">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text" data-i18n="ready">就绪</span>

    <div id="info-panel">

        <div style="font-size:12px;color:var(--text3);word-break:break-all;font-family:'JetBrains Mono',monospace;" id="np-url"></div>
      </div>
    </div>
  </main>
</div>

<!-- Import Modal -->
<div class="modal-backdrop" id="modal-import">
  <div class="modal">

    <div id="import-tabs">

<div class="modal-backdrop" id="modal-add-channel">
  <div class="modal">
    <div class="modal-title"><span>➕</span><span data-i18n="addChannelTitle">添加频道</span></div>

    </div>
  </div>

<div id="toast-container"></div>

<script>
// ════════ i18n ════════
const LANGS = {
  zh: {
    play: '播放', importM3U: '导入 M3U', playlists: '播放列表', history: '历史',
    addChannel: '添加', clearHistory: '清空', ready: '就绪',
    noVideoTitle: '准备就绪', noVideoSub: '在上方输入地址，或从左侧选择频道',
    importM3UTitle: '导入 M3U 播放列表', fromFile: '从文件', pasteText: '粘贴文本', fromURL: '从链接',
    dropM3U: '拖入 .m3u / .m3u8 文件，或点击选择', m3uHint: '支持标准 M3U 格式 (#EXTINF)',
    pasteM3ULabel: '粘贴 M3U 内容', m3uURL: 'M3U 链接', playlistName: '播放列表名称',
    playlistNamePlaceholder: '我的播放列表', importBtn: '导入', cancel: '取消',
    addChannelTitle: '添加频道', channelName: '频道名称', group: '分组',
    logoURL: 'Logo 地址（可选）', playlist: '添加到播放列表', newPlaylist: '新建播放列表...',
    add: '添加', search: '搜索频道...', noChannels: '暂无频道', noHistory: '暂无历史记录',
    imported: '已导入', channels: ' 个频道', deletePlaylist: '删除播放列表',
    confirmDelete: '确认删除此播放列表？', loadError: '加载失败', playing: '正在播放',
    fetchingM3U: '正在获取 M3U...', parseError: 'M3U 解析失败', networkError: '网络错误',
    urlRequired: '请输入视频地址', channelUrlRequired: '请填写频道地址',
    historyCleared: '历史记录已清空', parsePreview: '解析到',
  },
  en: {
    play: 'Play', importM3U: 'Import M3U', playlists: 'Playlists', history: 'History',
    addChannel: 'Add', clearHistory: 'Clear', ready: 'Ready',
    noVideoTitle: 'Ready to Play', noVideoSub: 'Enter a URL above or pick a channel',
    importM3UTitle: 'Import M3U Playlist', fromFile: 'From File', pasteText: 'Paste Text', fromURL: 'From URL',
    dropM3U: 'Drop .m3u / .m3u8 file here or click to browse', m3uHint: 'Supports standard M3U format with #EXTINF tags',
    pasteM3ULabel: 'Paste M3U content', m3uURL: 'M3U URL', playlistName: 'Playlist Name',
    playlistNamePlaceholder: 'My Playlist', importBtn: 'Import', cancel: 'Cancel',
    addChannelTitle: 'Add Channel', channelName: 'Channel Name', group: 'Group',
    logoURL: 'Logo URL (optional)', playlist: 'Add to Playlist', newPlaylist: 'New playlist...',
    add: 'Add', search: 'Search channels...', noChannels: 'No channels yet', noHistory: 'No history yet',
    imported: 'Imported', channels: ' channels', deletePlaylist: 'Delete Playlist',
    confirmDelete: 'Delete this playlist?', loadError: 'Load failed', playing: 'Playing',
    fetchingM3U: 'Fetching M3U...', parseError: 'M3U parse error', networkError: 'Network error',
    urlRequired: 'Please enter a URL', channelUrlRequired: 'Channel URL is required',
    historyCleared: 'History cleared', parsePreview: 'Parsed',
  }
};

let lang = localStorage.getItem('vp-lang') || 'zh';
function t(k) { return LANGS[lang][k] || k; }
function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); if (k) el.textContent = t(k); });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { const k = el.getAttribute('data-i18n-placeholder'); if (k) el.placeholder = t(k); });
  document.getElementById('lang-btn').textContent = lang === 'zh' ? 'EN' : '中文';
  document.getElementById('channel-search').placeholder = t('search');
}
function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('vp-lang', lang);
  applyLang(); renderPlaylists(); renderHistory();
}

// ════════ State ════════
let store = { playlists: [], history: [] };
let currentChannel = null;
let hls = null;

// ════════ API ════════
const api = {
  async get(path) { const r = await fetch(path); return r.json(); },
  async post(path, body) { const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) }); return r.json(); },
  async del(path) { const r = await fetch(path, { method:'DELETE' }); return r.json(); },
};

async function loadData() {
  try {
    store = await api.get('/api/data');
    if (!store.playlists) store.playlists = [];
    if (!store.history) store.history = [];
    renderPlaylists(); renderHistory();
  } catch(e) { console.error(e); }
}

// ════════ Render ════════
function getLogoChar(name) { return (name || '?').trim().charAt(0).toUpperCase(); }
function getVideoType(url) {
  if (!url) return '';
  const u = url.toLowerCase().split('?')[0];
  if (u.endsWith('.m3u8') || u.includes('m3u8')) return 'hls';
  if (u.endsWith('.mp4') || u.endsWith('.webm') || u.endsWith('.mkv') || u.endsWith('.avi')) return 'mp4';
  if (u.startsWith('rtmp://')) return 'rtmp';
  return '';
}
function badgeHTML(url) {
  const tp = getVideoType(url);
  if (!tp) return '';
  return `<span class="badge badge-${tp === 'hls' ? 'hls' : tp === 'mp4' ? 'mp4' : 'rtmp'}">${tp.toUpperCase()}</span>`;
}

function renderPlaylists() {
  const el = document.getElementById('playlist-channels');
  const q = (document.getElementById('channel-search').value || '').toLowerCase();
  if (!store.playlists.length) {
    el.innerHTML = `<div class="empty-state"><svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><p>${t('noChannels')}</p></div>`;
    return;
  }
  let html = '';
  store.playlists.forEach(pl => {
    const filtered = pl.channels.filter(ch => !q || ch.name.toLowerCase().includes(q) || (ch.group||'').toLowerCase().includes(q));
    if (!filtered.length && q) return;
    html += `<div style="margin-bottom:6px;">
      <div class="playlist-header">
        <span style="font-size:13px;">📋</span>
        <span class="playlist-header-name">${esc(pl.name)}</span>
        <span class="playlist-count">${pl.channels.length}</span>
        <button class="icon-btn del" title="${t('deletePlaylist')}" onclick="deletePlaylist('${pl.id}',event)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6M10 11v6M14 11v6"/></svg>
        </button>
      </div>`;
    const grouped = {};
    filtered.forEach(ch => { const g = ch.group || ''; if (!grouped[g]) grouped[g] = []; grouped[g].push(ch); });
    Object.entries(grouped).forEach(([group, chs]) => {
      if (group) html += `<div class="group-label">${esc(group)}</div>`;
      chs.forEach(ch => { html += channelItemHTML(ch, currentChannel && currentChannel.url === ch.url); });
    });
    html += `</div>`;
  });
  el.innerHTML = html || `<div class="empty-state"><p>${t('noChannels')}</p></div>`;
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!store.history || !store.history.length) {
    el.innerHTML = `<div class="empty-state"><svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>${t('noHistory')}</p></div>`;
    return;
  }
  el.innerHTML = store.history.map(ch => channelItemHTML(ch, currentChannel && currentChannel.url === ch.url, true)).join('');
}

function channelItemHTML(ch, playing, isHistory=false) {
  const logoContent = ch.logo
    ? `<img src="${esc(ch.logo)}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt=""><span style="display:none;width:100%;height:100%;align-items:center;justify-content:center;">${getLogoChar(ch.name)}</span>`
    : getLogoChar(ch.name);
  return `<div class="channel-item ${playing ? 'playing' : ''}" onclick="playChannel(${JSON.stringify(ch).replace(/"/g,'&quot;')})">
    <div class="channel-logo">${logoContent}</div>
    <div class="channel-info">
      <div class="channel-name">${esc(ch.name || ch.url)}</div>
      <div class="channel-group">${ch.group ? esc(ch.group) + ' · ' : ''}${badgeHTML(ch.url)}</div>
    </div>
    ${playing ? `<div class="playing-bars"><span></span><span></span><span></span></div>` : ''}
    <div class="channel-actions">
      <button class="icon-btn" title="Copy URL" onclick="copyURL('${esc(ch.url)}', event)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </button>
    </div>
  </div>`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════ Player ════════
const video = document.getElementById('video');

function playChannel(ch) {
  currentChannel = ch;
  playURL(ch.url, ch.name || ch.url);
  api.post('/api/history', ch).then(() => loadData());
}

function playFromURLBar() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) { toast(t('urlRequired'), 'error'); return; }
  playURL(url, url);
  const ch = { id: Date.now().toString(), name: url, url, group: '', logo: '', addedAt: Date.now() };
  currentChannel = ch;
  api.post('/api/history', ch).then(() => loadData());
}

function playURL(url, title) {
  document.getElementById('no-video').style.display = 'none';
  document.getElementById('video-container').style.display = 'block';
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('np-title').textContent = title;
  document.getElementById('np-url').textContent = url;
  document.getElementById('now-playing-info').style.display = 'block';
  document.getElementById('status-url').textContent = url;
  setStatus('loading', t('playing') + ': ' + (title.length > 50 ? title.slice(0,50)+'...' : title));
  showLoading(true);
  if (hls) { hls.destroy(); hls = null; }
  const type = getVideoType(url);
  if (type === 'hls' || (!type && url.includes('m3u8'))) {
    if (Hls.isSupported()) {
      hls = new Hls({ enableWorker: false, lowLatencyMode: true });
      hls.loadSource(url); hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(()=>{}); showLoading(false); setStatus('live', t('playing') + ': ' + title); });
      hls.on(Hls.Events.ERROR, (e, data) => { if (data.fatal) { showLoading(false); setStatus('error', t('loadError') + ': ' + (data.details || '')); toast(t('loadError'), 'error'); } });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url; video.play().catch(()=>{}); showLoading(false); setStatus('live', t('playing') + ': ' + title);
    }
  } else {
    video.src = url; video.play().catch(()=>{}); showLoading(false); setStatus('live', t('playing') + ': ' + title);
  }
  renderPlaylists(); renderHistory();
}

video.addEventListener('error', () => { showLoading(false); setStatus('error', t('loadError')); toast(t('loadError'), 'error'); });
video.addEventListener('waiting', () => showLoading(true));
video.addEventListener('playing', () => showLoading(false));
video.addEventListener('timeupdate', updateProgress);
video.addEventListener('play', updatePlayBtn);
video.addEventListener('pause', () => { updatePlayBtn(); document.getElementById('video-container').classList.add('paused'); });

function showLoading(v) { document.getElementById('loading-overlay').classList.toggle('active', v); }
function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (state === 'live' ? ' live' : state === 'error' ? ' error' : '');
  document.getElementById('status-text').textContent = text;
}
function togglePlayPause() { if (video.paused) video.play(); else video.pause(); }
function updatePlayBtn() {
  document.getElementById('play-icon').style.display = video.paused ? 'block' : 'none';
  document.getElementById('pause-icon').style.display = video.paused ? 'none' : 'block';
  document.getElementById('video-container').classList.toggle('paused', video.paused);
}
function skip(s) { video.currentTime = Math.max(0, video.currentTime + s); }
function seekTo(e) {
  const bar = document.getElementById('progress-bar');
  const rect = bar.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  if (video.duration && isFinite(video.duration)) video.currentTime = ratio * video.duration;
}
function updateProgress() {
  const dur = video.duration, cur = video.currentTime;
  if (dur && isFinite(dur)) {
    document.getElementById('progress-fill').style.width = (cur/dur*100) + '%';
    document.getElementById('time-label').textContent = fmtTime(cur) + ' / ' + fmtTime(dur);
  } else {
    document.getElementById('time-label').textContent = fmtTime(cur) + ' / ∞';
  }
}
function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
  if (h) return `${h}:${pad(m)}:${pad(sec)}`;
  return `${m}:${pad(sec)}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function setVolume(v) { video.volume = v; }
function toggleMute() { video.muted = !video.muted; }
function toggleFullscreen() {
  const el = document.getElementById('video-container');
  if (!document.fullscreenElement) el.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

// ════════ Sidebar ════════
function switchTab(tab) {
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.sidebar-pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + tab));
}

// ════════ Modals ════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-backdrop').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

function openImportModal() {
  openModal('modal-import'); switchImportTab('file');
  document.getElementById('playlist-name-input').value = '';
  document.getElementById('import-preview').style.display = 'none';
  document.getElementById('m3u-text-input').value = '';
  document.getElementById('m3u-url-input').value = '';
}

let importTab = 'file';
function switchImportTab(tab) {
  importTab = tab;
  ['file','text','url'].forEach(tp => {
    document.getElementById('import-' + tp).style.display = tp === tab ? 'block' : 'none';
    const btn = document.getElementById('itab-' + tp);
    btn.className = 'btn btn-sm ' + (tp === tab ? 'btn-primary' : 'btn-secondary');
  });
}

function onDragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('dragover'); }
function onDragLeave() { document.getElementById('drop-zone').classList.remove('dragover'); }
function onDrop(e) {
  e.preventDefault(); document.getElementById('drop-zone').classList.remove('dragover');
  const file = e.dataTransfer.files[0]; if (file) processFile(file);
}
function onFileSelect(e) { const file = e.target.files[0]; if (file) processFile(file); }
function processFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const content = e.target.result;
    showM3UPreview(content);
    document.getElementById('m3u-text-input').value = content;
    switchImportTab('text');
    if (!document.getElementById('playlist-name-input').value)
      document.getElementById('playlist-name-input').value = file.name.replace(/\.(m3u8?|txt)$/i,'');
  };
  reader.readAsText(file, 'utf-8');
}
function showM3UPreview(content) {
  const channels = parseM3U(content);
  const prev = document.getElementById('import-preview');
  prev.style.display = 'block';
  prev.textContent = `${t('parsePreview')} ${channels.length}${t('channels')}`;
}

async function doImport() {
  let content = '';
  const name = document.getElementById('playlist-name-input').value.trim() || t('playlistNamePlaceholder');
  if (importTab === 'file' || importTab === 'text') {
    content = document.getElementById('m3u-text-input').value.trim();
  } else {
    const url = document.getElementById('m3u-url-input').value.trim();
    if (!url) { toast(t('urlRequired'), 'error'); return; }
    toast(t('fetchingM3U'), 'info');
    try { const r = await fetch(url); content = await r.text(); }
    catch(e) { toast(t('networkError'), 'error'); return; }
  }
  if (!content) { toast(t('parseError'), 'error'); return; }
  const channels = parseM3U(content);
  if (!channels.length) { toast(t('parseError'), 'error'); return; }
  const playlist = { id: Date.now().toString(), name, channels, createdAt: Math.floor(Date.now()/1000) };
  await api.post('/api/playlists', playlist);
  await loadData();
  closeModal('modal-import');
  toast(`${t('imported')} ${channels.length}${t('channels')}`, 'success');
}

function parseM3U(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const channels = []; let current = {};
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.startsWith('#EXTINF:')) {
      current = {};
      const attrStr = line.slice(8);
      const lastComma = attrStr.lastIndexOf(',');
      if (lastComma !== -1) current.name = attrStr.slice(lastComma + 1).trim();
      const tvgName = attrStr.match(/tvg-name="([^"]*)"/i);
      const tvgLogo = attrStr.match(/tvg-logo="([^"]*)"/i);
      const groupTitle = attrStr.match(/group-title="([^"]*)"/i);
      if (tvgName) current.name = tvgName[1];
      if (tvgLogo) current.logo = tvgLogo[1];
      if (groupTitle) current.group = groupTitle[1];
    } else if (line.startsWith('#')) {
    } else if (line.startsWith('http') || line.startsWith('rtmp') || line.startsWith('rtp') || line.startsWith('udp')) {
      current.url = line;
      current.id = Date.now().toString() + Math.random().toString(36).slice(2);
      current.addedAt = Math.floor(Date.now()/1000);
      if (!current.name) current.name = line;
      channels.push({ ...current }); current = {};
    }
  }
  return channels;
}

function openAddChannelModal() {
  openModal('modal-add-channel');
  const sel = document.getElementById('ch-playlist');
  sel.innerHTML = `<option value="__new__">${t('newPlaylist')}</option>`;
  store.playlists.forEach(pl => {
    const opt = document.createElement('option');
    opt.value = pl.id; opt.textContent = pl.name; sel.appendChild(opt);
  });
  document.getElementById('ch-new-playlist-wrap').style.display = 'block';
  sel.onchange = () => { document.getElementById('ch-new-playlist-wrap').style.display = sel.value === '__new__' ? 'block' : 'none'; };
}

async function doAddChannel() {
  const url = document.getElementById('ch-url').value.trim();
  if (!url) { toast(t('channelUrlRequired'), 'error'); return; }
  const name = document.getElementById('ch-name').value.trim() || url;
  const group = document.getElementById('ch-group').value.trim();
  const logo = document.getElementById('ch-logo').value.trim();
  const ch = { id: Date.now().toString(), name, url, group, logo, addedAt: Math.floor(Date.now()/1000) };
  const selVal = document.getElementById('ch-playlist').value;
  let playlist;
  if (selVal === '__new__') {
    const plName = document.getElementById('ch-new-playlist').value.trim() || t('playlistNamePlaceholder');
    playlist = { id: Date.now().toString(), name: plName, channels: [ch], createdAt: Math.floor(Date.now()/1000) };
  } else {
    playlist = store.playlists.find(p => p.id === selVal);
    if (!playlist) return;
    playlist = { ...playlist, channels: [...playlist.channels, ch] };
  }
  await api.post('/api/playlists', playlist);
  await loadData();
  closeModal('modal-add-channel');
  toast(`${name} ${lang === 'zh' ? '已添加' : 'added'}`, 'success');
}

// ════════ Actions ════════
async function deletePlaylist(id, e) {
  e.stopPropagation();
  if (!confirm(t('confirmDelete'))) return;
  await api.del('/api/playlists/' + id); await loadData();
}
async function clearHistory() {
  await api.del('/api/history'); await loadData(); toast(t('historyCleared'), 'info');
}
function copyURL(url, e) {
  e.stopPropagation();
  navigator.clipboard.writeText(url).then(() => toast('URL copied', 'success')).catch(()=>{});
}

// ════════ Toast ════════
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success: '✓', error: '✕', info: 'i' };
  el.innerHTML = `<span style="font-weight:700;color:var(--${type === 'success' ? 'success' : type === 'error' ? 'danger' : 'accent'})">${icons[type]||''}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ════════ Keyboard ════════
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  if (e.key === ' ') { e.preventDefault(); togglePlayPause(); }
  if (e.key === 'ArrowLeft') skip(-5);
  if (e.key === 'ArrowRight') skip(5);
  if (e.key === 'ArrowUp') { video.volume = Math.min(1, video.volume+0.1); document.getElementById('vol-slider').value = video.volume; }
  if (e.key === 'ArrowDown') { video.volume = Math.max(0, video.volume-0.1); document.getElementById('vol-slider').value = video.volume; }
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'm' || e.key === 'M') toggleMute();
});
document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') playFromURLBar(); });

// ════════ Init ════════
applyLang();
loadData();
</script>
